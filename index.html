<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>エンターテイナー製作委員会</title>
<style>
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;margin:0;background:#f4f6f5;color:#1f2933}
  .wrap{max-width:520px;margin:0 auto;padding:16px}
  h1{font-size:18px;margin:8px 0 12px}
  h2{font-size:15px;margin:22px 0 8px}
  p.lead{font-size:13px;color:#667;margin:0 0 14px;line-height:1.6;white-space:pre-wrap}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  .req{color:#d64545;font-size:11px;margin-left:4px}
  input,select,textarea{box-sizing:border-box;padding:10px;border:1px solid #cbd2d9;border-radius:8px;font-size:15px;background:#fff;width:100%}
  textarea{min-height:110px}
  .chips label{display:flex;align-items:center;font-weight:400;margin:6px 0;background:#fff;border:1px solid #cbd2d9;border-radius:10px;padding:11px 12px;font-size:14px}
  .chips input{margin-right:10px;width:auto}
  button{width:100%;margin-top:20px;padding:14px;border:none;border-radius:10px;background:#06C755;color:#fff;font-size:16px;font-weight:600}
  button:disabled{background:#9bd6b3}
  .msg{margin-top:12px;text-align:center;font-size:14px;min-height:20px}
  .page{display:none}
  .loading{max-width:520px;margin:0 auto;padding:40px 16px;text-align:center;color:#889}
  .card{background:#fff;border:1px solid #e1e6ea;border-radius:10px;padding:12px;margin-bottom:10px}
  .row{display:flex;align-items:center;justify-content:space-between}
  .card .d{font-weight:600;font-size:15px}
  .card .sub{font-size:12px;color:#889;margin-top:4px}
  .card button{width:auto;margin:0;padding:7px 14px;font-size:13px;border-radius:8px}
  .card button.cancel{background:#fff;color:#d64545;border:1px solid #f0b3b3;font-weight:400}
  .empty{color:#889;font-size:13px;text-align:center;padding:10px 0}
  #tk_preview{margin-top:8px;max-width:100%;border-radius:8px;display:none}
  /* くじ演出 */
  .overlay{position:fixed;inset:0;background:rgba(15,23,25,.92);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:50}
  .overlay.on{display:flex}
  .spinner{width:90px;height:90px;border-radius:50%;border:8px solid rgba(255,255,255,.2);border-top-color:#06C755;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .overlay .t{color:#fff;font-size:18px;margin-top:22px;letter-spacing:2px}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:60;display:none}
  .win-badge{font-size:14px;color:#c98a00;font-weight:700;letter-spacing:3px;text-align:center}
  .win-title{font-size:38px;font-weight:800;margin:6px 0 4px;text-align:center;
    background:linear-gradient(90deg,#ff8a00,#ff3d77,#8a2be2);-webkit-background-clip:text;background-clip:text;color:transparent;animation:pop .6s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
  .prize-card{margin:14px auto 0;max-width:340px;border-radius:18px;padding:22px 18px;color:#fff;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#7b2ff7,#f107a3);box-shadow:0 12px 30px rgba(241,7,163,.35);animation:pop .7s .1s both}
  .prize-card.onsite{background:linear-gradient(135deg,#11998e,#38ef7d);box-shadow:0 12px 30px rgba(17,153,142,.35)}
  .prize-card .plabel{font-size:12px;opacity:.85;letter-spacing:2px}
  .prize-card .pname{font-size:25px;font-weight:800;margin-top:6px;line-height:1.3}
  .prize-card .pmsg{font-size:13px;margin-top:10px;opacity:.95;line-height:1.6}
  .prize-card .tk{font-size:24px;font-weight:800;letter-spacing:2px;margin-top:10px}
  .prize-card .shine{position:absolute;top:-60%;left:-30%;width:60%;height:220%;background:rgba(255,255,255,.25);transform:rotate(25deg);animation:shine 2.2s ease-in-out infinite}
  @keyframes shine{0%{left:-40%}60%,100%{left:130%}}
  .lose{text-align:center;padding:24px 6px}
  .lose .e{font-size:44px}
  .lose .t{font-size:22px;font-weight:700;color:#66707a;margin:8px 0}
  /* 歌詞くじ */
  .ly-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .ly-count{font-size:13px;color:#667}
  .ly-bar{height:8px;background:#e4e9ec;border-radius:99px;overflow:hidden;margin:6px 0 16px}
  .ly-bar i{display:block;height:100%;background:linear-gradient(90deg,#06C755,#38ef7d)}
  .ly-card{border-radius:16px;padding:22px 18px;color:#fff;position:relative;overflow:hidden;margin-top:14px;
    animation:pop .6s cubic-bezier(.2,1.4,.4,1)}
  .ly-card .rar{font-size:12px;letter-spacing:3px;font-weight:700;opacity:.95}
  .ly-card .lyr{font-size:21px;font-weight:700;line-height:1.7;margin:10px 0 8px;white-space:pre-wrap}
  .ly-card .song{font-size:13px;opacity:.9}
  .ly-card .shine{position:absolute;top:-60%;left:-30%;width:60%;height:220%;background:rgba(255,255,255,.22);transform:rotate(25deg);animation:shine 2.4s ease-in-out infinite}
  .rN{background:linear-gradient(135deg,#5b6b78,#8fa3b0)}
  .rR{background:linear-gradient(135deg,#1e6fd9,#4fc3f7)}
  .rSR{background:linear-gradient(135deg,#7b2ff7,#f107a3)}
  .rUR{background:linear-gradient(135deg,#ff8a00,#ff3d77,#8a2be2);background-size:200% 200%;animation:pop .6s cubic-bezier(.2,1.4,.4,1),grad 4s ease infinite}
  @keyframes grad{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .ly-links{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .ly-links a{flex:1;min-width:120px;text-align:center;text-decoration:none;padding:11px;border-radius:10px;
    background:rgba(255,255,255,.18);color:#fff;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.35)}
  .ly-audio{width:100%;margin-top:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-top:12px}
  .cell{background:#fff;border:1px solid #e1e6ea;border-radius:10px;padding:10px 8px;font-size:11px;min-height:66px;
    display:flex;flex-direction:column;justify-content:center;text-align:center;cursor:pointer}
  .cell.lock{background:#eceff1;color:#b0bac1;cursor:default}
  .cell .r{font-size:10px;font-weight:700;letter-spacing:1px;margin-bottom:4px}
  .cell .tx{line-height:1.4;overflow:hidden}
  .badgeN{color:#5b6b78}.badgeR{color:#1e6fd9}.badgeSR{color:#7b2ff7}.badgeUR{color:#ff3d77}
  /* 演出オーバーレイ（あとでmp4に差し替え可） */
  #ly_ov{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:70;background:#0b0f12}
  #ly_ov.on{display:flex}
  #ly_ov video{max-width:100%;max-height:100%}
  .burstfx{width:160px;height:160px;border-radius:50%;position:relative;animation:zoom 1.6s ease-in-out infinite}
  @keyframes zoom{0%,100%{transform:scale(.9);opacity:.7}50%{transform:scale(1.15);opacity:1}}
</style>
</head>
<body>
<div class="loading" id="loading">読み込み中…</div>

<!-- ===== リマインド設定 ===== -->
<div class="wrap page" id="page-remind">
  <h1>ライブのリマインド設定</h1>
  <p class="lead" id="rmd_lead"></p>
  <label>いつ思い出したいですか?（複数選べます）</label>
  <div class="chips" id="rmd_presets"></div>
  <label>日付で指定する（任意）</label>
  <input type="date" id="rmd_custom">
  <button id="rmd_send">リマインドを設定する</button>
  <div class="msg" id="rmd_msg"></div>
  <div id="rmd_list"></div>
</div>

<!-- ===== 整理番号の登録／くじ ===== -->
<div class="wrap page" id="page-ticket">
  <h1>整理番号の登録/確認</h1>
  <p class="lead" id="tk_lead">ご自身の整理番号の確認・登録ができます。当日はここからくじが引けます。</p>

  <div id="tk_list"></div>
  <div id="tk_result"></div>

  <button id="tk_add" style="display:none;background:#fff;color:#06C755;border:2px solid #06C755">＋ 整理番号を追加で登録する</button>

  <div id="tk_form" style="display:none">
    <label>お名前（ニックネーム可）<span class="req">必須</span></label>
    <input type="text" id="tk_name" maxlength="20">
    <label>整理番号<span class="req">必須</span></label>
    <input type="text" id="tk_ticket" inputmode="numeric" placeholder="例: 0012">
    <label>整理番号が見える写真<span class="req">必須</span></label>
    <input type="file" id="tk_file" accept="image/*">
    <img id="tk_preview">
    <label>お住まいの都道府県<span class="req">必須</span></label>
    <select id="tk_pref"></select>
    <div id="tk_city_wrap" style="display:none">
      <label>市区町村（宮城県）<span class="req">必須</span></label>
      <select id="tk_city"></select>
    </div>
    <button id="tk_send">登録する</button>
    <div class="msg" id="tk_msg"></div>
  </div>
</div>

<!-- ===== 今日の歌詞くじ ===== -->
<div class="wrap page" id="page-lyric">
  <h1>今日の歌詞くじ</h1>
  <p class="lead">1日1回、歌詞の一節が引けます。同じものは出ないので、集めてコンプリートを目指そう！</p>

  <div class="ly-head">
    <span class="ly-count" id="ly_count">－</span>
    <span class="ly-count" id="ly_status"></span>
  </div>
  <div class="ly-bar"><i id="ly_bar" style="width:0%"></i></div>

  <button id="ly_draw">今日のくじを引く</button>
  <div class="msg" id="ly_msg"></div>

  <div id="ly_result"></div>

  <h2>コレクション</h2>
  <div class="grid" id="ly_grid"></div>
  <div id="ly_detail"></div>
</div>

<!-- ===== プレゼントの配送先登録 ===== -->
<div class="wrap page" id="page-ship">
  <h1>プレゼントの配送先登録</h1>
  <p class="lead">ステッカー＆オリジナルフラッグをお送りします。配送先をご登録ください。<br>
    ご記入いただいた情報は発送のみに使用します。</p>

  <div id="sp_view"></div>

  <div id="sp_form" style="display:none">
    <label>お名前（配送先のご本人）<span class="req">必須</span></label>
    <input type="text" id="sp_name" maxlength="40" placeholder="例: 山田 太郎">
    <label>郵便番号<span class="req">必須</span></label>
    <input type="text" id="sp_zip" inputmode="numeric" maxlength="8" placeholder="例: 9800001">
    <label>都道府県<span class="req">必須</span></label>
    <select id="sp_pref"></select>
    <label>住所（市区町村・番地）<span class="req">必須</span></label>
    <input type="text" id="sp_addr" maxlength="80" placeholder="例: 仙台市青葉区中央1-1-1">
    <label>建物名・部屋番号</label>
    <input type="text" id="sp_bldg" maxlength="60" placeholder="例: ○○マンション101">
    <label>電話番号<span class="req">必須</span></label>
    <input type="text" id="sp_tel" inputmode="numeric" maxlength="15" placeholder="例: 09012345678">
    <button id="sp_send">この内容で登録する</button>
    <div class="msg" id="sp_msg"></div>
  </div>
</div>

<!-- ===== 紛失連絡 ===== -->
<div class="wrap page" id="page-lost">
  <h1>チケット紛失のご連絡</h1>
  <p class="lead">チケットを紛失された場合は、状況をお知らせください。運営から個別にご連絡します。</p>
  <div id="lost_mine"></div>
  <label>お名前（ニックネーム可）<span class="req">必須</span></label>
  <input type="text" id="lost_name" maxlength="20">
  <label>状況・ご連絡内容<span class="req">必須</span></label>
  <textarea id="lost_text" placeholder="例: 整理番号0012のチケットを紛失しました"></textarea>
  <button id="lost_send">送信する</button>
  <div class="msg" id="lost_msg"></div>
</div>

<!-- ===== 準備中 ===== -->
<div class="wrap page" id="page-notready">
  <h1>準備中</h1>
  <p>この機能はまだ準備中です。</p>
</div>

<div class="overlay" id="overlay"><div class="spinner"></div><div class="t">抽選中…</div></div>
<div id="ly_ov"><div id="ly_ov_inner"></div></div>
<canvas id="confetti"></canvas>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  /* ===== 設定 ===== */
  var LIFF_ID = "2010741413-WmIydf7M";
  var GAS_URL = "https://script.google.com/macros/s/AKfycbwIyBnqwIWqFt8jaIqUF_tjrFB_ZYqgJVX4fUjotBeF-h81kzTn1UGRUNg3anmMfQMhPQ/exec";
  /* =============== */

  var LIVE_DATE = "2027-06-12";
  var LIVE_TITLE = "長利和季ワンマンライブ「エンターテイナー Reprise」";
  var PRESETS = [30, 14, 7, 3, 1];
  var PREFS = ["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県","新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","愛知県","三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県","鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];
  var MIYAGI = ["仙台市青葉区","仙台市宮城野区","仙台市若林区","仙台市太白区","仙台市泉区","石巻市","塩竈市","気仙沼市","白石市","名取市","角田市","多賀城市","岩沼市","登米市","栗原市","東松島市","大崎市","富谷市","蔵王町","七ヶ宿町","大河原町","村田町","柴田町","川崎町","丸森町","亘理町","山元町","松島町","七ヶ浜町","利府町","大和町","大郷町","大衡村","色麻町","加美町","涌谷町","美里町","女川町","南三陸町"];

  var profile = { userId:"", displayName:"" };
  var tkImage = null, lotOpen = false;

  function showPage(id){ document.getElementById('loading').style.display='none';
    var el=document.getElementById('page-'+id); if(el) el.style.display='block'; }
  function fail(t){ document.getElementById('loading').textContent=t; }
  function val(id){ var e=document.getElementById(id); return e?e.value:''; }
  function setMsg(id,t){ var e=document.getElementById(id); if(e) e.textContent=t; }
  function pad(n){ return ('0'+n).slice(-2); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  function post(payload){ return fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)}).then(function(r){return r.json();}); }
  function closeIt(){ try{ if(liff.isInClient()) liff.closeWindow(); }catch(e){} }

  function getPage(){
    var u=new URL(location.href);
    var st=u.searchParams.get('liff.state');
    if(st){ var s=decodeURIComponent(st);
            var q=(s.split('?')[1]||''); var p=new URLSearchParams(q).get('page');
            if(p) return p.toLowerCase();
            var path=s.split('?')[0].replace(/^\/+/,''); if(path) return path.toLowerCase(); }
    return (u.searchParams.get('page')||'remind').toLowerCase();
  }

  liff.init({ liffId: LIFF_ID }).then(function(){
    if(!liff.isLoggedIn()){ liff.login(); return; }
    return liff.permission.query('profile').then(function(s){
      if(s.state==='prompt') return liff.permission.requestAll();
    }).then(function(){ return liff.getProfile(); });
  }).then(function(p){
    if(p) profile=p;
    var page=getPage();
    if(page==='remind'){ showPage('remind'); initRemind(); }
    else if(page==='ticket'){ showPage('ticket'); initTicket(); }
    else if(page==='lost'){ showPage('lost'); initLost(); }
    else if(page==='ship'){ showPage('ship'); initShip(); }
    else if(page==='lyric'){ showPage('lyric'); initLyric(); }
    else showPage('notready');
  }).catch(function(e){ fail('読み込みに失敗しました。もう一度開いてください。'); });

  /* ===== リマインド ===== */
  function minusDays(dateStr,n){
    var p=dateStr.split('-'); var d=new Date(Date.UTC(+p[0],+p[1]-1,+p[2]));
    d.setUTCDate(d.getUTCDate()-n);
    return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate());
  }
  function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

  function initRemind(){
    document.getElementById('rmd_lead').textContent =
      LIVE_TITLE + '\n（2027年6月12日）のチケット、忘れないように思い出す日を設定できます。設定した日の20時にお知らせします。';
    var tdy=todayStr();
    var html=PRESETS.map(function(n){
      var d=minusDays(LIVE_DATE,n); if(d<tdy) return '';
      return '<label><input type="checkbox" class="rmd_p" value="'+d+'">'+n+'日前（'+d+'）</label>';
    }).join('');
    document.getElementById('rmd_presets').innerHTML = html || '<span class="empty">選べる候補がありません</span>';
    var c=document.getElementById('rmd_custom'); c.min=tdy; c.max=LIVE_DATE;
    loadRemindList();
  }
  function loadRemindList(){
    post({action:'getReminds',userId:profile.userId}).then(function(res){
      var list=(res&&res.reminds)||[];
      if(list.length===0){ document.getElementById('rmd_list').innerHTML=''; return; }
      document.getElementById('rmd_list').innerHTML='<h2>設定済みのリマインド</h2>'+list.map(function(x){
        return '<div class="card row"><span class="d">'+esc(x.date)+'</span>'
          +'<button class="cancel" onclick="delRemind('+x.row+')">取消</button></div>';
      }).join('');
    }).catch(function(){});
  }
  window.delRemind=function(row){
    if(!confirm('このリマインドを取り消しますか?')) return;
    post({action:'deleteRemind',row:row}).then(function(){ loadRemindList(); });
  };
  document.getElementById('rmd_send').onclick=function(){
    var dates=[].slice.call(document.querySelectorAll('.rmd_p:checked')).map(function(c){return c.value;});
    var custom=val('rmd_custom'); if(custom) dates.push(custom);
    if(dates.length===0){ setMsg('rmd_msg','思い出したい日を1つ以上選んでください。'); return; }
    var btn=this; btn.disabled=true; setMsg('rmd_msg','設定中…');
    post({action:'submitRemind',dates:dates,userName:profile.displayName,userId:profile.userId})
      .then(function(res){
        if(res&&res.ok){ setMsg('rmd_msg',res.added+'件のリマインドを設定しました。');
          [].slice.call(document.querySelectorAll('.rmd_p:checked')).forEach(function(c){c.checked=false;});
          document.getElementById('rmd_custom').value=''; btn.disabled=false; loadRemindList();
        } else { setMsg('rmd_msg','失敗: '+((res&&res.error)||'不明')); btn.disabled=false; }
      }).catch(function(err){ setMsg('rmd_msg','通信エラー: '+err.message); btn.disabled=false; });
  };

  /* ===== 整理番号 ／ くじ ===== */
  function initTicket(){
    var pref=document.getElementById('tk_pref');
    pref.innerHTML='<option value="">選択してください</option>'+PREFS.map(function(p){return '<option>'+p+'</option>';}).join('');
    var city=document.getElementById('tk_city');
    city.innerHTML='<option value="">選択してください</option>'+MIYAGI.map(function(c){return '<option>'+c+'</option>';}).join('');
    pref.onchange=function(){ document.getElementById('tk_city_wrap').style.display=(pref.value==='宮城県')?'block':'none'; };
    document.getElementById('tk_name').value = profile.displayName || '';
    loadTickets();
  }
  document.getElementById('tk_file').onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var max=1400,w=img.width,h=img.height;
        if(w>max||h>max){ if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        tkImage=c.toDataURL('image/jpeg',0.8);
        var pv=document.getElementById('tk_preview'); pv.src=tkImage; pv.style.display='block';
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  };
  var myTickets = [];
  function loadTickets(){
    post({action:'getMyTickets',userId:profile.userId}).then(function(res){
      if(!res||!res.ok) return;
      lotOpen = !!res.open;
      var list=res.tickets||[];
      myTickets = list;
      if(list.length===0){
        // まだ1件もない → フォームを最初から出す
        document.getElementById('tk_list').innerHTML='';
        document.getElementById('tk_add').style.display='none';
        document.getElementById('tk_form').style.display='block';
        return;
      }
      // 登録済みがある → 一覧を出し、フォームは隠して「追加登録」ボタンを出す
      document.getElementById('tk_form').style.display='none';
      document.getElementById('tk_add').style.display='block';
      document.getElementById('tk_list').innerHTML='<h2>登録済みの整理番号</h2>'+list.map(function(t,i){
        var right='';
        if(t.drawn){ right='<button class="cancel" style="color:#7b2ff7;border-color:#d7bff7" onclick="showDrawn('+i+')">結果を見る</button>'; }
        else if(lotOpen){ right='<button onclick="draw(\''+esc(t.ticket)+'\')">くじを引く</button>'; }
        else { right='<span class="sub">くじは当日16時から</span>'; }
        var sub = esc(t.pref||'')+(t.city?(' '+esc(t.city)):'');
        if(t.drawn) sub += '　抽選済み：'+esc(t.drawn.name);
        return '<div class="card"><div class="row"><span class="d">'+esc(t.ticket)+'</span>'+right+'</div>'
          + '<div class="sub">'+sub+'</div></div>';
      }).join('');
    }).catch(function(){});
  }
  // 抽選済みの結果をあとから表示（演出なし）
  window.showDrawn=function(i){
    var t=myTickets[i]; if(!t||!t.drawn) return;
    showResult(t.drawn, t.ticket, true);
  };
  // 「追加で登録する」→ フォームを表示
  document.getElementById('tk_add').onclick=function(){
    this.style.display='none';
    var f=document.getElementById('tk_form');
    f.style.display='block';
    setMsg('tk_msg','');
    f.scrollIntoView({behavior:'smooth',block:'start'});
  };
  document.getElementById('tk_send').onclick=function(){
    var name=val('tk_name').trim(), ticket=val('tk_ticket').trim(), pref=val('tk_pref'), city=val('tk_city');
    if(!name||!ticket){ setMsg('tk_msg','お名前と整理番号は必須です。'); return; }
    if(!tkImage){ setMsg('tk_msg','整理番号が見える写真を選んでください。'); return; }
    if(!pref){ setMsg('tk_msg','都道府県を選んでください。'); return; }
    if(pref==='宮城県'&&!city){ setMsg('tk_msg','市区町村を選んでください。'); return; }
    var btn=this; btn.disabled=true; setMsg('tk_msg','送信中…');
    post({action:'saveTicketPhoto',ticket:ticket,imageBase64:tkImage,imageMime:'image/jpeg'})
      .then(function(r){
        return post({action:'submitTicket',ticket:ticket,name:name,pref:pref,city:city,
          photoUrl:(r&&r.url)||'',userId:profile.userId});
      })
      .then(function(res){
        if(res&&res.ok){
          setMsg('tk_msg','');
          document.getElementById('tk_ticket').value=''; tkImage=null;
          document.getElementById('tk_preview').style.display='none';
          document.getElementById('tk_file').value='';
          document.getElementById('tk_form').style.display='none';  // 登録後は一覧に戻す
          btn.disabled=false; loadTickets();
        } else { setMsg('tk_msg',(res&&res.error)||'登録できませんでした。'); btn.disabled=false; }
      })
      .catch(function(err){ setMsg('tk_msg','通信エラー: '+err.message); btn.disabled=false; });
  };
  window.draw=function(ticket){
    document.getElementById('overlay').classList.add('on');
    var started=Date.now();
    post({action:'drawLottery',ticket:ticket,name:profile.displayName,userId:profile.userId})
      .then(function(res){
        var wait=Math.max(0,2800-(Date.now()-started));
        setTimeout(function(){
          document.getElementById('overlay').classList.remove('on');
          if(!res||!res.ok){ alert((res&&res.error)||'エラーが発生しました'); return; }
          showResult(res.result, ticket, res.already);
          loadTickets();
        }, wait);
      })
      .catch(function(err){
        document.getElementById('overlay').classList.remove('on');
        alert('通信エラー: '+err.message);
      });
  };
  function showResult(r, ticket, already){
    var el=document.getElementById('tk_result');
    var when = r.at ? '<div style="text-align:center;font-size:12px;color:#889;margin-top:8px">抽選日時：'+esc(r.at)+'</div>' : '';
    if(r.type==='none'){
      el.innerHTML='<div class="lose"><div class="e">🍀</div><div class="t">はずれ</div><p>'+esc(r.msg||'')+'</p>'
        +'<div class="sub">整理番号 '+esc(ticket)+'</div></div>'+when;
      el.scrollIntoView({behavior:'smooth'}); return;
    }
    var cls = (r.type==='onsite') ? 'prize-card onsite' : 'prize-card';
    el.innerHTML = '<div style="margin-top:18px">'
      + (already?'':'<div class="win-badge">★ CONGRATULATIONS ★</div>')
      + '<div class="win-title">'+(already?'当選済み':'当たり！')+'</div>'
      + '<div class="'+cls+'"><div class="shine"></div>'
      + '<div class="plabel">当選賞品</div><div class="pname">'+esc(r.name)+'</div>'
      + (r.msg?'<div class="pmsg">'+esc(r.msg)+'</div>':'')
      + '<div class="tk">整理番号 '+esc(ticket)+'</div></div>' + when + '</div>';
    el.scrollIntoView({behavior:'smooth'});
    if(!already) burst();
  }
  function burst(){
    var cv=document.getElementById('confetti'); cv.style.display='block';
    cv.width=window.innerWidth; cv.height=window.innerHeight;
    var ctx=cv.getContext('2d'), colors=['#ff3d77','#ff8a00','#ffd200','#38ef7d','#7b2ff7','#00c6ff'], parts=[];
    for(var i=0;i<160;i++){ parts.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.5,
      w:6+Math.random()*6,h:8+Math.random()*8,c:colors[i%colors.length],
      vy:2+Math.random()*3,vx:-1.5+Math.random()*3,rot:Math.random()*6,vr:-0.2+Math.random()*0.4}); }
    var t0=Date.now();
    (function frame(){
      ctx.clearRect(0,0,cv.width,cv.height);
      parts.forEach(function(p){ p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore(); });
      if(Date.now()-t0<4500) requestAnimationFrame(frame);
      else { ctx.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
    })();
  }

  /* ===== 歌詞くじ ===== */
  // 演出動画を入れる場合はここにファイル名を書く（GitHubの同じ場所に置く）
  // 例: {N:'fx_n.mp4', R:'fx_r.mp4', SR:'fx_sr.mp4', UR:'fx_ur.mp4'}
  var FX = { N:'', R:'', SR:'', UR:'' };
  var FX_MS = { N:1200, R:1600, SR:2200, UR:2800 };  // 動画が無いときのCSS演出の長さ
  var lyState = null;

  function initLyric(){
    post({action:'getLyricState',userId:profile.userId}).then(function(res){
      if(!res||!res.ok) return;
      lyState=res;
      renderLyric();
    }).catch(function(){});
  }
  function renderLyric(){
    var s=lyState;
    document.getElementById('ly_count').textContent = s.owned+' / '+s.total+' 種類';
    var pct = s.total? Math.round(s.owned/s.total*100):0;
    document.getElementById('ly_bar').style.width = pct+'%';
    var btn=document.getElementById('ly_draw'), st=document.getElementById('ly_status');
    if(s.complete){ btn.style.display='none'; st.textContent='コンプリート！🎉'; }
    else if(s.drewToday){ btn.style.display='none'; st.textContent='今日はもう引きました'; }
    else { btn.style.display='block'; btn.disabled=false; st.textContent=''; }
    // 今日引いたものがあれば表示
    if(s.today){ document.getElementById('ly_result').innerHTML = cardHtml(s.today, true); }
    renderGrid();
  }
  function renderGrid(){
    var s=lyState;
    document.getElementById('ly_grid').innerHTML = s.list.map(function(x,i){
      if(!x.has) return '<div class="cell lock"><div class="r">'+esc(x.rarity)+'</div><div class="tx">？？？</div></div>';
      return '<div class="cell" onclick="lyShow(\''+esc(x.id)+'\')">'
        + '<div class="r badge'+esc(x.rarity)+'">'+esc(x.rarity)+'</div>'
        + '<div class="tx">'+esc(String(x.text).slice(0,14))+'</div></div>';
    }).join('');
  }
  window.lyShow=function(id){
    var item=null;
    lyState.list.forEach(function(x){ if(x.id===id&&x.has) item=x; });
    if(!item) return;
    var el=document.getElementById('ly_detail');
    el.innerHTML = cardHtml(item, false);
    el.scrollIntoView({behavior:'smooth',block:'center'});
  };
  function cardHtml(x, isToday){
    var links='';
    if(x.youtube) links += '<a href="'+esc(x.youtube)+'" target="_blank" rel="noopener">YouTubeで聴く</a>';
    if(x.music)   links += '<a href="'+esc(x.music)+'" target="_blank" rel="noopener">音楽配信で聴く</a>';
    var audio = x.audio ? '<audio class="ly-audio" controls preload="none" src="'+esc(x.audio)+'"></audio>' : '';
    return '<div class="ly-card r'+esc(x.rarity)+'"><div class="shine"></div>'
      + '<div class="rar">'+esc(x.rarity)+(isToday?'　今日の一節':'')+'</div>'
      + '<div class="lyr">'+esc(x.text)+'</div>'
      + '<div class="song">'+esc(x.song)+'</div>'
      + audio
      + (links?'<div class="ly-links">'+links+'</div>':'')
      + '</div>';
  }
  // 演出（mp4があれば再生／無ければCSS演出）
  function playFx(rarity){
    return new Promise(function(resolve){
      var ov=document.getElementById('ly_ov'), inner=document.getElementById('ly_ov_inner');
      var file=FX[rarity]||'';
      ov.classList.add('on');
      if(file){
        inner.innerHTML='<video src="'+file+'" autoplay playsinline muted></video>';
        var v=inner.querySelector('video');
        var done=function(){ ov.classList.remove('on'); inner.innerHTML=''; resolve(); };
        v.onended=done;
        setTimeout(done, 8000); // 保険
      } else {
        var color={N:'#8fa3b0',R:'#4fc3f7',SR:'#f107a3',UR:'#ff8a00'}[rarity]||'#8fa3b0';
        inner.innerHTML='<div class="burstfx" style="background:radial-gradient(circle,'+color+',transparent 70%)"></div>';
        setTimeout(function(){ ov.classList.remove('on'); inner.innerHTML=''; resolve(); }, FX_MS[rarity]||1500);
      }
    });
  }
  document.getElementById('ly_draw').onclick=function(){
    var btn=this; btn.disabled=true; setMsg('ly_msg','');
    post({action:'drawLyric',name:profile.displayName,userId:profile.userId})
      .then(function(res){
        if(!res||!res.ok){ setMsg('ly_msg',(res&&res.error)||'エラーが発生しました'); btn.disabled=false; return; }
        return playFx(res.item.rarity).then(function(){
          document.getElementById('ly_result').innerHTML = cardHtml(res.item, true);
          document.getElementById('ly_result').scrollIntoView({behavior:'smooth',block:'center'});
          if(res.item.rarity==='SR'||res.item.rarity==='UR') burst();
          initLyric();  // 状態を更新
        });
      })
      .catch(function(err){ setMsg('ly_msg','通信エラー: '+err.message); btn.disabled=false; });
  };

  /* ===== 配送 ===== */
  function initShip(){
    var pref=document.getElementById('sp_pref');
    pref.innerHTML='<option value="">選択してください</option>'+PREFS.map(function(p){return '<option>'+p+'</option>';}).join('');
    post({action:'getMyShip',userId:profile.userId}).then(function(res){
      if(res&&res.ok&&res.ship){ renderShip(res.ship); }
      else { document.getElementById('sp_form').style.display='block'; }
    }).catch(function(){ document.getElementById('sp_form').style.display='block'; });
  }
  function renderShip(s){
    var status = s.status||'未発送';
    var badge = (status==='発送済み')
      ? '<span style="color:#06C755;font-weight:700">発送済み</span>' + (s.shippedAt?'<span class="sub">（'+esc(s.shippedAt)+'）</span>':'')
      : '<span style="color:#c98a00;font-weight:700">準備中</span>';
    document.getElementById('sp_view').innerHTML =
      '<h2>ご登録済みの配送先</h2>'
      + '<div class="card">'
      + '<div class="d">'+esc(s.name)+'</div>'
      + '<div class="sub">〒'+esc(s.zip)+'<br>'+esc(s.pref)+esc(s.addr)+(s.bldg?('<br>'+esc(s.bldg)):'')+'<br>TEL '+esc(s.tel)+'</div>'
      + '</div>'
      + '<div class="card"><div class="row"><span>発送状況</span>'+badge+'</div></div>'
      + '<p class="lead" style="margin-top:14px">内容の変更が必要な場合は、このトークでご連絡ください。</p>';
  }
  document.getElementById('sp_send').onclick=function(){
    var name=val('sp_name').trim(), zip=val('sp_zip').trim().replace(/[^0-9]/g,''),
        pref=val('sp_pref'), addr=val('sp_addr').trim(), bldg=val('sp_bldg').trim(),
        tel=val('sp_tel').trim().replace(/[^0-9]/g,'');
    if(!name){ setMsg('sp_msg','お名前を入力してください。'); return; }
    if(zip.length<7){ setMsg('sp_msg','郵便番号を7桁で入力してください。'); return; }
    if(!pref){ setMsg('sp_msg','都道府県を選んでください。'); return; }
    if(!addr){ setMsg('sp_msg','住所を入力してください。'); return; }
    if(tel.length<10){ setMsg('sp_msg','電話番号を正しく入力してください。'); return; }
    if(!confirm('この内容で登録します。\n\n'+name+'\n〒'+zip+'\n'+pref+addr+'\n'+bldg+'\nTEL '+tel+'\n\nよろしいですか?')) return;
    var btn=this; btn.disabled=true; setMsg('sp_msg','送信中…');
    post({action:'submitShip',name:name,zip:zip,pref:pref,addr:addr,bldg:bldg,tel:tel,userId:profile.userId})
      .then(function(res){
        if(res&&res.ok){
          setMsg('sp_msg','');
          document.getElementById('sp_form').style.display='none';
          initShip();
        } else { setMsg('sp_msg',(res&&res.error)||'登録できませんでした。'); btn.disabled=false; }
      })
      .catch(function(err){ setMsg('sp_msg','通信エラー: '+err.message); btn.disabled=false; });
  };

  /* ===== 紛失連絡 ===== */
  function initLost(){
    document.getElementById('lost_name').value = profile.displayName || '';
    post({action:'getMyTickets',userId:profile.userId}).then(function(res){
      var list=(res&&res.tickets)||[];
      if(list.length===0) return;
      document.getElementById('lost_mine').innerHTML='<h2>登録済みの整理番号</h2>'+list.map(function(t){
        return '<div class="card"><span class="d">'+esc(t.ticket)+'</span></div>';
      }).join('');
    }).catch(function(){});
  }
  document.getElementById('lost_send').onclick=function(){
    var name=val('lost_name').trim(), text=val('lost_text').trim();
    if(!name||!text){ setMsg('lost_msg','お名前と内容を入力してください。'); return; }
    var btn=this; btn.disabled=true; setMsg('lost_msg','送信中…');
    post({action:'submitLost',name:name,text:text,userId:profile.userId})
      .then(function(res){
        if(res&&res.ok){
          setMsg('lost_msg','送信しました。運営からご連絡します。');
          document.getElementById('lost_text').value='';
          setTimeout(closeIt, 1500);   // 送信後にアプリを閉じる
        }
        else { setMsg('lost_msg','失敗: '+((res&&res.error)||'不明')); btn.disabled=false; }
      })
      .catch(function(err){ setMsg('lost_msg','通信エラー: '+err.message); btn.disabled=false; });
  };
</script>
